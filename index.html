<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CASTOR – Tu Asesor de Oposiciones</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800&display=swap');
  :root {
    --yellow: rgb(250, 250, 0); --yellow-dim: rgba(250,250,0,0.15); --yellow-glow: rgba(250,250,0,0.4);
    --red: #cc2200; --red-dark: #991a00; --dark: #0a0a0a; --dark2: #141414; --dark3: #1e1e1e;
    --text: #f0f0e0; --text-muted: #aaa88a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
  header { position: relative; z-index: 10; background: linear-gradient(135deg, #0a0a0a 0%, #1a0800 50%, #0a0a0a 100%); border-bottom: 2px solid var(--red); padding: 16px 24px; display: flex; align-items: center; gap: 20px; box-shadow: 0 4px 30px rgba(204,34,0,0.3); }
  .castor-avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--yellow); object-fit: cover; }
  .header-text h1 { font-family: 'Bangers', cursive; font-size: 2.8rem; color: var(--yellow); letter-spacing: 4px; text-shadow: 3px 3px 0 var(--red); line-height: 1; }
  main { flex: 1; display: flex; flex-direction: column; max-width: 900px; width: 100%; margin: 0 auto; padding: 24px 20px; gap: 20px; }
  .chat-box { background: var(--dark2); border: 1px solid rgba(250,250,0,0.12); border-radius: 16px; flex: 1; min-height: 400px; max-height: 500px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .msg-user { display: flex; justify-content: flex-end; }
  .msg-user-bubble { background: var(--red); color: #fff; border-radius: 16px 16px 4px 16px; padding: 12px 16px; max-width: 80%; font-size: 0.9rem; }
  .msg-ai { display: flex; gap: 12px; align-items: flex-start; }
  .msg-ai-bubble { background: var(--dark3); border: 1px solid rgba(250,250,0,0.15); border-radius: 4px 16px 16px 16px; padding: 14px 18px; max-width: 85%; font-size: 0.88rem; line-height: 1.65; }
  .input-area { background: var(--dark2); border: 1.5px solid rgba(250,250,0,0.2); border-radius: 16px; padding: 14px 16px; }
  .input-row { display: flex; gap: 10px; }
  textarea { flex: 1; background: transparent; border: none; color: white; resize: none; outline: none; }
  .send-btn { background: var(--yellow); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<header>
  <img class="castor-avatar" src="castor.jpg" alt="CASTOR">
  <div class="header-text">
    <h1>⛏ CASTOR</h1>
    <p>Tu asesor inteligente de oposiciones</p>
  </div>
</header>

<main>
  <div class="chat-box" id="chatBox">
    <div class="msg-ai">
      <div class="msg-ai-bubble"><strong>¡Hola!</strong> Soy CASTOR. He cargado el conocimiento legal para ayudarte. ¿Qué necesitas consultar?</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" placeholder="Escribe tu duda legal aquí..."></textarea>
      <button class="send-btn" onclick="sendMessage()">⬆</button>
    </div>
  </div>
</main>

<script>
  // TU CLAVE YA INTEGRADA
  const API_KEY = 'AIzaSyAAY24xhBhkl7jUl6eiKZbjk0RVtww-8pU';
  
  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    // Mostrar mensaje usuario
    const box = document.getElementById('chatBox');
    box.innerHTML += `<div class="msg-user"><div class="msg-user-bubble">${text}</div></div>`;
    input.value = '';

    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: "Eres un experto en oposiciones. Responde a esto: " + text }] }]
        })
      });

      const data = await response.json();
      const aiResponse = data.candidates[0].content.parts[0].text;
      
      box.innerHTML += `<div class="msg-ai"><div class="msg-ai-bubble">${aiResponse.replace(/\n/g, '<br>')}</div></div>`;
    } catch (e) {
      box.innerHTML += `<div class="msg-ai"><div class="msg-ai-bubble" style="color:red">Error de conexión. Revisa la consola.</div></div>`;
    }
    box.scrollTop = box.scrollHeight;
  }
</script>
</body>
</html>
